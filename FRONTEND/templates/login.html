<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureBank — Login</title>

  <!-- Bootstrap 5 CSS (CDN) -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <!-- Custom overrides -->
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body class="bg-light">

  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-12 col-sm-10 col-md-7 col-lg-5">

        <!-- Bank branding -->
        <div class="text-center mb-4">
          <h1 class="fw-bold text-primary display-6">🏦 SecureBank</h1>
          <p class="text-muted">Online Banking Portal</p>
        </div>

        <!-- Login card -->
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h2 class="card-title h5 mb-4 text-center">Sign in to your account</h2>

            <!-- Server-side error alert -->
            {% if error %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
              {{ error }}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endif %}

            <!-- Login form -->
            <form method="POST" action="/login" novalidate>
              <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Username</label>
                <input
                  type="text"
                  id="username"
                  name="username"
                  class="form-control"
                  placeholder="Enter your username"
                  required
                  autocomplete="username"
                />
              </div>

              <div class="mb-4">
                <label for="password" class="form-label fw-semibold">Password</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="form-control"
                  placeholder="Enter your password"
                  required
                  autocomplete="current-password"
                />
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">Login</button>
              </div>
            </form>

          </div>
        </div>

        <!-- Demo credentials hint (workshop only) -->
        <div class="text-center mt-3">
          <small class="text-muted">
            Demo accounts: <strong>alice / password123</strong> &nbsp;|&nbsp;
            <strong>bob / securepass</strong>
          </small>
        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS bundle (CDN) -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmEQnJpEFRzJlZ8hJYhiD8RMa5"
    crossorigin="anonymous"
  ></script>
</body>
</html>
